services:
  web:
    image: python:3.10-slim
    container_name: compose-web
    working_dir: /app
    volumes:
      - ./app:/app
    command: sh -c "python3 -m pip install --no-cache-dir -r /app/requirements.txt && python3 /app/app.py"
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: compose-redis
    ports:
      - "6379:6379"
