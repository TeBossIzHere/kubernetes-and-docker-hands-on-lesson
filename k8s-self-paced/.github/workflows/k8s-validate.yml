name: Kubernetes Validate

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Validate manifests with dry-run client
        run: |
          while IFS= read -r file; do
            kubectl apply --dry-run=client -f "$file"
          done < <(find k8s-self-paced -type f -name "*.yaml" \
            ! -path "k8s-self-paced/.github/*")
