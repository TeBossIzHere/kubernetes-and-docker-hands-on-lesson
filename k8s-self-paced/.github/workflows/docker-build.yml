name: Docker Build

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Dockerfile exists
        run: test -f k8s-self-paced/01-docker-basics/Dockerfile
      - name: Build Docker image
        run: docker build -t docker-k8s-lab:test k8s-self-paced/01-docker-basics
